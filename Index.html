<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avtoritet Team | Сім'я UA Online</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(135deg, #ff2a2a, #800000);
            padding: 40px 20px;
            box-shadow: 0 4px 15px rgba(255, 42, 42, 0.3);
        }
        h1 { margin: 0; font-size: 2.5em; text-transform: uppercase; letter-spacing: 2px; }
        .motto { font-style: italic; color: #ccc; margin-top: 10px; }
        .container { padding: 30px 20px; max-width: 800px; margin: 0 auto; }
        .card {
            background: #1a1a1a;
            border: 2px solid #ff2a2a;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .leader { font-size: 1.5em; color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>⚔️ Avtoritet Team ⚔️</h1>
        <p class="motto">«Авторитет завойовується вчинками, а не словами»</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>👑 Керівництво Сім'ї</h2>
            <p class="leader">Засновник / Лідер: <span style="color: #fff;">Artem_Poroshenko</span></p>
        </div>

        <div class="card">
            <h2>📋 Про нас</h2>
            <p>Вітаємо на офіційній сторінці родини Avtoritet Team. Ми — сила, з якою рахуються на сервері. Повага, братство та взаємодопомога — наші головні правила.</p>
        </div>
    </div>

</body>
</html>
